<!doctype html>
<html lang="ca">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Trader Brain · Narratives</title>
<style>
  :root {
    --bg:#0a0e14; --card:#131823; --border:#1e2634; --fg:#d4dce8;
    --fg-mute:#6b7789; --accent:#4a9eff; --ok:#4ade80; --bad:#f87171;
    --warn:#fbbf24; --violet:#a78bfa;
  }
  html,body { background:var(--bg); color:var(--fg); margin:0;
    font-family:'JetBrains Mono','Consolas',monospace; font-size:13px; }
  .header { display:flex; justify-content:space-between; align-items:center;
    padding:10px 20px; background:var(--card); border-bottom:1px solid var(--border); }
  .brand { font-weight:700; font-size:15px; }
  .nav a { padding:4px 10px; background:var(--card); border:1px solid var(--border);
    border-radius:5px; color:var(--fg-mute); text-decoration:none; font-size:12px;
    margin-left:5px; }
  .nav a:hover { color:var(--fg); border-color:var(--accent); }
  .nav a.active { color:var(--fg); border-color:var(--accent); background:rgba(74,158,255,0.1); }
  .container { padding:20px; max-width:1100px; margin:0 auto; }
  .stats { display:flex; gap:15px; margin-bottom:20px; flex-wrap:wrap; }
  .stat { background:var(--card); padding:10px 15px; border-radius:6px;
    border:1px solid var(--border); }
  .stat .k { color:var(--fg-mute); font-size:11px; }
  .stat .v { font-size:16px; font-weight:700; }
  .trade { background:var(--card); border:1px solid var(--border); border-radius:8px;
    padding:14px 18px; margin-bottom:12px; }
  .trade-hdr { display:flex; justify-content:space-between; gap:10px; flex-wrap:wrap;
    margin-bottom:8px; }
  .trade-hdr .dir { font-weight:700; font-size:14px; }
  .trade-hdr .dir.BUY { color:var(--ok); }
  .trade-hdr .dir.SELL { color:var(--bad); }
  .trade-hdr .pnl { font-weight:700; }
  .trade-hdr .pnl.pos { color:var(--ok); }
  .trade-hdr .pnl.neg { color:var(--bad); }
  .trade-hdr .meta { color:var(--fg-mute); font-size:11px; }
  .summary { padding:6px 10px; background:#1a2030; border-radius:4px;
    border-left:3px solid var(--accent); margin-bottom:10px; font-style:italic;
    color:#b5c0d4; }
  details { margin-top:8px; }
  summary { cursor:pointer; color:var(--fg-mute); font-size:12px; padding:4px 0; }
  summary:hover { color:var(--fg); }
  .actions { margin-top:8px; padding-left:15px; border-left:2px solid var(--border); }
  .action { margin:8px 0; padding:6px 10px; background:#0f1320; border-radius:4px;
    border-left:3px solid var(--fg-mute); }
  .action.OPEN { border-left-color:var(--accent); }
  .action.AVERAGE { border-left-color:var(--warn); }
  .action.PARTIAL_CLOSE { border-left-color:var(--violet); }
  .action.FULL_CLOSE { border-left-color:var(--ok); }
  .action-hdr { display:flex; justify-content:space-between; font-size:12px;
    font-weight:600; }
  .action-hdr .type { letter-spacing:0.5px; }
  .action-hdr .type.OPEN { color:var(--accent); }
  .action-hdr .type.AVERAGE { color:var(--warn); }
  .action-hdr .type.PARTIAL_CLOSE { color:var(--violet); }
  .action-hdr .type.FULL_CLOSE { color:var(--ok); }
  .action-hdr .t { color:var(--fg-mute); }
  .reason { margin-top:4px; color:#c5d0e0; font-size:12px; line-height:1.45; }
  .thesis { margin-top:3px; color:var(--fg-mute); font-size:11px; font-style:italic; }
  .pnl-chip { padding:1px 6px; background:#1a2030; border-radius:3px; font-weight:600; }
  .pnl-chip.pos { color:var(--ok); }
  .pnl-chip.neg { color:var(--bad); }
  #status { position:fixed; top:12px; right:20px; padding:4px 10px; background:#222;
    color:#8f8; border-radius:4px; font-size:11px; }
  @media (max-width:820px) {
    .container { padding:12px; }
    .stat { flex:1 1 calc(50% - 10px); }
    .trade-hdr .meta { font-size:10px; }
  }
</style>
</head>
<body>
<div class="header">
  <div class="brand">📖 Trade Narratives <span style="color:var(--fg-mute);font-size:11px;">— què i per què</span></div>
  <div class="nav">
    <a href="/">Dashboard</a>
    <a href="/trades">📚 Trades</a>
    <a href="/narratives" class="active">📖 Narratives</a>
    <a href="/flow">Flow</a>
  </div>
</div>
<div id="status">loading…</div>
<div class="container">
  <div class="stats" id="stats"></div>
  <div id="list"></div>
</div>
<script>
const status = document.getElementById('status');
const list = document.getElementById('list');
const statsEl = document.getElementById('stats');

function fmtDur(s){
  if(!s) return '—';
  if(s<60) return Math.round(s)+'s';
  if(s<3600) return Math.round(s/60)+'m';
  return Math.round(s/3600)+'h'+Math.round((s%3600)/60)+'m';
}
function fmtTs(iso){
  if(!iso) return '—';
  try {
    const d = new Date(iso);
    return d.toLocaleString('ca-ES', {month:'short', day:'2-digit', hour:'2-digit', minute:'2-digit'});
  } catch { return iso.slice(0,16); }
}
function fmtPnl(n){
  if(n == null) return '—';
  return (n>=0?'+':'')+n.toFixed(2)+'$';
}
function esc(s){
  return (s||'').toString()
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function load(){
  try {
    const r = await fetch('/api/narratives?limit=100', {cache:'no-store'});
    if(!r.ok) throw new Error('HTTP '+r.status);
    const d = await r.json();
    const ns = d.narratives || [];
    render(ns);
    status.textContent = 'live · '+new Date().toLocaleTimeString();
    status.style.color='#8f8';
  } catch(e) {
    status.textContent = 'error: '+e.message;
    status.style.color='#fbbf24';
  }
}

function render(ns){
  // Stats
  const total = ns.length;
  const wins = ns.filter(n => (n.total_pnl||0) > 0).length;
  const losses = ns.filter(n => (n.total_pnl||0) < 0).length;
  const totalPnl = ns.reduce((a,n)=>a+(n.total_pnl||0), 0);
  statsEl.innerHTML = `
    <div class="stat"><div class="k">Trades</div><div class="v">${total}</div></div>
    <div class="stat"><div class="k">Wins</div><div class="v" style="color:var(--ok)">${wins}</div></div>
    <div class="stat"><div class="k">Losses</div><div class="v" style="color:var(--bad)">${losses}</div></div>
    <div class="stat"><div class="k">P&L Total</div><div class="v" style="color:${totalPnl>=0?'var(--ok)':'var(--bad)'}">${fmtPnl(totalPnl)}</div></div>
    <div class="stat"><div class="k">Win rate</div><div class="v">${total?Math.round(wins/total*100):0}%</div></div>
  `;
  // List
  list.innerHTML = ns.map(n => {
    const dir = n.direction || '?';
    const pnl = n.total_pnl || 0;
    const pnlCls = pnl>=0 ? 'pos' : 'neg';
    const actions = (n.actions||[]).map(a => {
      const pnlChip = a.pnl_delta!=null
        ? `<span class="pnl-chip ${a.pnl_delta>=0?'pos':'neg'}">${fmtPnl(a.pnl_delta)}</span>` : '';
      const lotTxt = a.lot ? ` · lot ${a.lot}` : '';
      return `
        <div class="action ${a.type}">
          <div class="action-hdr">
            <span><span class="type ${a.type}">${a.type}</span> @ ${(a.price||0).toFixed(2)}${lotTxt} ${pnlChip}</span>
            <span class="t">${fmtTs(a.utc)}</span>
          </div>
          ${a.reason ? `<div class="reason">${esc(a.reason)}</div>` : ''}
          ${a.thesis ? `<div class="thesis">Tesi: ${esc(a.thesis)}</div>` : ''}
        </div>`;
    }).join('');
    return `
      <div class="trade">
        <div class="trade-hdr">
          <span>
            <span class="dir ${dir}">${dir}</span>
            <span class="meta"> · ${fmtTs(n.started_utc)} → ${fmtTs(n.ended_utc)} · ${fmtDur(n.duration_s)}</span>
          </span>
          <span class="pnl ${pnlCls}">${fmtPnl(pnl)}</span>
        </div>
        <div class="summary">${esc(n.summary||'(sense resum)')}</div>
        <details>
          <summary>${(n.actions||[]).length} accions · ${n.avg_count||0} avg · ${n.partial_count||0} partial · tancament: ${esc(n.close_reason||'—')}</summary>
          <div class="actions">${actions}</div>
        </details>
      </div>`;
  }).join('');
}

load();
setInterval(load, 30000); // refresca cada 30s
</script>
</body>
</html>
